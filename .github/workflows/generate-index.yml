name: Generate Personality Index

on:
  pull_request:
    paths:
      - 'personalities/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate PERSONALITIES.md
        run: node scripts/generate-index.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PERSONALITIES.md
          git diff --cached --quiet || git commit -m "docs: auto-generate personality index"
          git push
