name: Feature Request
description: Suggest an improvement to the plugin itself (not a new personality)
title: "feat: [SHORT DESCRIPTION]"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        ## Suggest a Feature

        Have an idea for improving the plugin? Commands, schema changes, new capabilities — we're all ears.

        For new personality requests, use the "New Personality Request" template instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that the plugin doesn't support today?
      placeholder: |
        I want to be able to preview a personality before swapping to it...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: |
        A /claude-personalities:preview command that shows sample
        output in the character's voice without changing settings...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use regularly
        - Really need this
    validations:
      required: true
